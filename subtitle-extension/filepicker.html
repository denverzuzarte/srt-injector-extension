<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SRT Injector — Choose File</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 24px;
      gap: 16px;
    }
    p { font-size: 13px; color: #aaa; text-align: center; line-height: 1.5; }
    button {
      background: #22c55e;
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 11px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #msg {
      font-size: 12px;
      color: #ffc107;
      min-height: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <p>Select your <strong style="color:#00cfff">.srt</strong> subtitle file.</p>
  <button id="btnPick">📂 Choose SRT file</button>
  <div id="msg"></div>
  <script src="filepicker.js"></script>
</body>
</html>
